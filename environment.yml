name: ViralRiver
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core Runtimes
  - python=3.9.15
  - numpy=2.0.2
  - perl=5.26.2
  
  # Python Libraries
  - biopython=1.85
  
  # Bioinformatics Core Tools
  - fastp=0.22.0
  - kraken2=2.1.3         # Añadido explícitamente (asumido por krakentools)
  - krakentools=1.2        # Añadido explícitamente para extract_kraken_reads.py
  - megahit=1.2.9
  - bwa=0.7.18
  - minimap2=2.28
  - bowtie2=2.5.2          # Añadido explícitamente (asumido por tu módulo 3)
  - samtools=1.6           # Tu versión exacta (muy importante por la compatibilidad de idxstats)
  - seqkit=2.13.0
  
  # Utilities used in scripts
  - pigz=2.8
  - wget=1.20.3
  - blast=2.16.0
  - sra-tools=3.2.1
name: ViralRiver
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core runtimes
  - python=3.9
  - perl

  # Python libraries
  - biopython

  # Bioinformatics tools
  - fastp=0.22.0
  - kraken2=2.1.3
  - krakentools=1.2
  - megahit=1.2.9
  - bwa=0.7.18
  - minimap2=2.28
  - bowtie2=2.5.2
  - samtools
  - seqkit=2.13.0

  # Utilities
  - pigz=2.8
  - wget
  - blast=2.16.0
  - sra-tools=3.2.1
